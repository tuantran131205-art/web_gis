{% extends 'stores/base.html' %}

{% block title %}Đăng nhập – PhoneStore{% endblock %}

{% block content %}
<div class="container" style="max-width:460px">
  <div class="card" style="padding:2rem">
    <h1 style="font-size:1.75rem;font-weight:800;margin-bottom:.5rem">Đăng nhập 👋</h1>
    <p style="color:var(--text-muted);margin-bottom:2rem">Chào mừng trở lại!</p>

    <form method="post" novalidate>
      {% csrf_token %}

      <div class="form-group">
        <label class="form-label" for="id_username">Tên đăng nhập</label>
        <input class="form-control" type="text" name="username" id="id_username"
               value="{{ form.username.value|default:'' }}" placeholder="Tên đăng nhập" autofocus />
      </div>

      <div class="form-group">
        <label class="form-label" for="id_password">Mật khẩu</label>
        <input class="form-control" type="password" name="password" id="id_password" placeholder="Mật khẩu" />
      </div>

      {% if form.non_field_errors %}
        <p class="form-error" style="margin-bottom:1rem">{{ form.non_field_errors.0 }}</p>
      {% endif %}

      <button type="submit" class="btn btn-primary btn-block" style="margin-bottom:1rem">
        🔐 Đăng nhập
      </button>
    </form>

    <p style="text-align:center;color:var(--text-muted);font-size:.9rem">
      Chưa có tài khoản? <a href="/register/">Đăng ký miễn phí</a>
    </p>
  </div>
</div>
{% endblock %}
